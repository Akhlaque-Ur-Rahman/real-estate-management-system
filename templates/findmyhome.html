<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css" integrity="sha512-M5Kq4YVQrjg5c2wsZSn27Dkfm/2ALfxmun0vUE3mPiJyK53hQBHYCVAtvMYEC7ZXmYLg8DVG4tF8gD27WmDbsg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Real Estate Management Project</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,
400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,
400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link
rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
</head>
<body>
<div class="listing-bg">

    <div class="main-wrapper">
        <div class="result-header">
            <h1>Find Your Next Space</h1>
            <p>Showing matching properties in your area</p>
        </div>

        <div class="content-layout">
            <aside class="side-panel">
                <div class="panel-box">
                    <h3>Refine Search</h3>
                    <div class="filter-item">
                        <label>Budget (Range)</label>
                        <input type="range" min="5000" max="100000" class="slider">
                    </div>
                    <div class="filter-item">
                        <label>Property Category</label>
                        <select id="catSelect">
                            <option>Apartment</option>
                            <option>Independent House</option>
                            <option>Villa</option>
                        </select>
                    </div>
                    <button class="apply-filter-btn">Update Results</button>
                </div>
            </aside>

            <section class="listing-grid">
                
                <div class="prop-card">
                    <div class="img-container">
                        <img src="property1.jpg" alt="House">
                        <span class="tag-label">FOR RENT</span>
                    </div>
                    <div class="prop-info">
                        <h2>Modern 2BHK Flat</h2>
                        <p class="location-text"><i class="fa-solid fa-location-arrow"></i> Boring Road, Patna</p>
                        <div class="spec-icons">
                            <span><i class="fa-solid fa-bed"></i> 2 Bed</span>
                            <span><i class="fa-solid fa-bath"></i> 2 Bath</span>
                        </div>
                        <div class="price-action">
                            <span class="amount">₹22,000<small>/mo</small></span>
                            <a href="property-detail.html" class="view-btn">Details</a>
                        </div>
                        <a href="{{ url_for('add_property') }}" class="add-btn">Add New Property</a>
                    </div>
                </div>

                </section>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" 
integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" 
crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/fontawesome.min.js" 
integrity="sha512-obFNtQ1JKCrxPBPLmYDUevlriATl5EhvwU3CFtdW/HKOkeAe0bbsyZfHO44/f1QyndrZJ464TQvrRP9ZjyXSSA==" 
crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="{{ url_for('static',filename='js/script.js') }}"></script>
</body>
</html>
