<body>
<div class="forgot-body">
    <div class="forgot-wrapper">
        <div class="home-logo-nav">
            <a href="../index.html" title="Go to Home">
                <i class="fa-solid fa-house-chimney"></i>
                <span>HOME</span>
            </a>
        </div>

        <div class="glass-card">
            <div class="icon-circle">
                <i class="fa-solid fa-key"></i>
            </div>

            <h2 class="reset">Reset Password</h2>
            <form id="forgotForm" autocomplete="off">
                <div class="input-group">
                    <input type="password" id="newPass" placeholder="New Password" required autocomplete="new-password">
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPass" placeholder="Confirm New Password" required autocomplete="confirm-new new-password">
                </div>

                <div class="btn-group">
                    <button type="submit" class="continue-btn">Continue</button>
                    <a href="login.html" class="cancel-btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    </div>
