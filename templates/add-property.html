<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property - Real Estate</title>
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> -->
    <link rel="stylesheet" href="/static/css/style.css">

</head>
<body>

    <div class="form-container">
        <header>
            <h1>Add New Property</h1>
            <p>Fill the details below to list your property.</p>
        </header>

        <form action="/add-property" method="POST" id="propertyForm">
            <div class="input-group">
                <label for="p_name">Property Name</label>
                <input type="text" id="p_name" name="p_name" placeholder="Flat Name" required>
            </div>

            <div class="input-group">
                <label for="p_price">Price (₹)</label>
                <input type="number" id="p_price" name="p_price" placeholder="Monthly Rent" required>
            </div>

            <div class="input-group">
                <label for="p_loc">Location</label>
                <input type="text" id="p_loc" name="p_loc" placeholder="Area Name" required>
            </div>

            <button type="submit" class="btn-submit">List Property</button>
        </form>
        
        <div id="message"></div>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
