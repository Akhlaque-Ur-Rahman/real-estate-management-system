<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>

<body>
    < class="quote-body">
    <div class="glass-wrapper">
        <div class="home-nav">
            <a href="/"><i class="fa-solid fa-house"></i> HOME</a>
        </div>

        <div class="glass-container">
            <div class="glass-form">
                <h2>Request a Quote</h2>
                <p>Tell us your requirements and we'll get back to you.</p>
                
                <form id="quoteForm">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="userName" placeholder="Full Name" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="userEmail" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-building"></i>
                        <select id="propertyType" required>
                            <option value="" disabled selected>Property Type</option>
                            <option value="apartment">Apartment</option>
                            <option value="villa">Villa/House</option>
                            <option value="commercial">Commercial</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-message"></i>
                        <textarea id="message" placeholder="Describe your requirements..." rows="4"></textarea>
                    </div>

                    <button type="submit" class="quote-btn">Send Request &rarr;</button>
                </form>
            </div>
        </div>
    </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" 
            integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" 
            crossorigin="anonymous" referrerpolicy="no-referrer">

                crossorigin="anonymous" referrerpolicy="no-referrer">
            </script>
            <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js">

            </script>
            <script src="{{ url_for('static',filename='js/script.js') }}">

            </script>
    </body>
</html>
